name: Build WiiChat

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install devkitPro (CORRETO)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget

          wget https://apt.devkitpro.org/install-devkitpro-pacman
          sudo bash install-devkitpro-pacman

          sudo dkp-pacman -Syu --noconfirm
          sudo dkp-pacman -S --noconfirm devkitPPC libogc wii-dev

      - name: Set env
        run: |
          echo "DEVKITPRO=/opt/devkitpro" >> $GITHUB_ENV
          echo "DEVKITPPC=/opt/devkitpro/devkitPPC" >> $GITHUB_ENV
          echo "/opt/devkitpro/tools/bin" >> $GITHUB_PATH

      - name: Build
        run: make

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: WiiChat
          path: |
            boot.dol
            boot.elf