name: Build WiiChat

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Compilar
        uses: docker://devkitpro/devkitppc:latest
        with:
          args: make

      - name: Enviar boot.dol
        uses: actions/upload-artifact@v4
        with:
          name: WiiChat
          path: |
            boot.dol
            boot.elf
