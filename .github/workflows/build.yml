name: Build WiiChat

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build via devkitPro Docker (CORRETO)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/project \
            -w /project \
            devkitpro/devkitppc:latest \
            bash -c "make"

      - name: Upload boot.dol
        uses: actions/upload-artifact@v4
        with:
          name: WiiChat
          path: |
            boot.dol
            boot.elf