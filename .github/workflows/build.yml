name: Build WiiChat

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: devkitpro/devkitppc:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build WiiChat
        run: make

      - name: Upload boot.dol
        uses: actions/upload-artifact@v4
        with:
          name: WiiChat
          path: |
            boot.dol
            boot.elf