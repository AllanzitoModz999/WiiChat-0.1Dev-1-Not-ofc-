name: Build WiiChat

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build boot.dol
    runs-on: ubuntu-latest

    # Official devkitPro image – ships devkitPPC + libogc pre-installed
    container:
      image: devkitpro/devkitppc:latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Build ─────────────────────────────────────────────────
      - name: Build WiiChat
        run: |
          # devkitPro sets DEVKITPRO in the container profile; make it explicit
          export DEVKITPRO=${DEVKITPRO:-/opt/devkitpro}
          export DEVKITPPC=${DEVKITPPC:-$DEVKITPRO/devkitPPC}
          export PATH="$DEVKITPPC/bin:$DEVKITPRO/tools/bin:$PATH"
          make

      # ── 3. Verify artefact ───────────────────────────────────────
      - name: Verify boot.dol exists
        run: |
          test -f boot.dol
          ls -lh boot.dol

      # ── 4. Upload artefact ───────────────────────────────────────
      - name: Upload boot.dol
        uses: actions/upload-artifact@v4
        with:
          name: wiichat-boot-dol
          path: boot.dol
          retention-days: 30